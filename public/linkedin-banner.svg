<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
    </style>

    <!-- Grain noise filter -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay"/>
    </filter>

    <!-- Warm radial glow top-left -->
    <radialGradient id="glow" cx="0" cy="0" r="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#d4874a" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#111009" stop-opacity="0"/>
    </radialGradient>

    <!-- Right fade for clean text area -->
    <linearGradient id="rightFade" x1="55%" y1="0" x2="100%" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#111009" stop-opacity="0"/>
      <stop offset="100%" stop-color="#111009" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Clip to banner bounds -->
    <clipPath id="banner">
      <rect width="1584" height="396"/>
    </clipPath>
  </defs>

  <g clip-path="url(#banner)">

    <!-- Base background -->
    <rect width="1584" height="396" fill="#111009"/>

    <!-- Warm glow -->
    <rect width="1584" height="396" fill="url(#glow)"/>

    <!-- Speed lines from bottom-left origin -->
    <g opacity="0.055" stroke="#d4874a" stroke-width="1.2">
      <line x1="80" y1="480" x2="0"    y2="0"/>
      <line x1="80" y1="480" x2="300"  y2="0"/>
      <line x1="80" y1="480" x2="560"  y2="0"/>
      <line x1="80" y1="480" x2="820"  y2="0"/>
      <line x1="80" y1="480" x2="1080" y2="0"/>
      <line x1="80" y1="480" x2="1300" y2="0"/>
      <line x1="80" y1="480" x2="1584" y2="0"/>
      <line x1="80" y1="480" x2="1584" y2="160"/>
      <line x1="80" y1="480" x2="1584" y2="370"/>
    </g>

    <!-- Right side subtle overlay -->
    <rect width="1584" height="396" fill="url(#rightFade)"/>

    <!-- Grain overlay -->
    <rect width="1584" height="396" fill="white" filter="url(#grain)" opacity="0.045"/>

    <!-- Left vertical rust bar -->
    <rect x="58" y="72" width="4" height="240" fill="#d4874a" opacity="0.85" rx="2"/>

    <!-- Bottom rust border -->
    <rect x="0" y="389" width="1584" height="5" fill="#d4874a" opacity="0.75"/>

    <!-- Decorative top-right squares (Epitech-inspired) -->
    <rect x="1490" y="0"  width="50" height="50" fill="#d4874a" opacity="0.12"/>
    <rect x="1534" y="0"  width="50" height="50" fill="#d4874a" opacity="0.07"/>
    <rect x="1490" y="44" width="50" height="50" fill="#d4874a" opacity="0.06"/>

    <!-- Small mono label -->
    <text x="80" y="105"
      font-family="'Courier New', Courier, monospace"
      font-size="15" fill="#d4874a" letter-spacing="4" opacity="0.9">
      // PORTFOLIO
    </text>

    <!-- Main name -->
    <text x="78" y="230"
      font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif"
      font-size="148" fill="#f0e6cc" letter-spacing="10">
      ROMARIC GUILBERT
    </text>

    <!-- Tagline -->
    <text x="80" y="272"
      font-family="'Courier New', Courier, monospace"
      font-size="19" fill="#d4874a" letter-spacing="2.5" opacity="0.9">
      From low-level C to AI — always building.
    </text>

    <!-- Info strip -->
    <text x="80" y="335"
      font-family="'Courier New', Courier, monospace"
      font-size="15" fill="#3e3a30" letter-spacing="2">
      Toulouse  ·  Epitech Bachelor  ·  Open to internship Jun–Aug 2026
    </text>

    <!-- Floating tech tags — right side -->
    <!-- C -->
    <rect x="1050" y="68"  width="52"  height="30" rx="2" fill="#1c1a13" stroke="#2a261c" stroke-width="1"/>
    <text x="1076" y="88" font-family="'Courier New', monospace" font-size="14" fill="#7a6f5e" text-anchor="middle">C</text>

    <!-- Python -->
    <rect x="1130" y="100" width="84"  height="30" rx="2" fill="#1c1a13" stroke="#d4874a" stroke-width="1" opacity="0.7"/>
    <text x="1172" y="120" font-family="'Courier New', monospace" font-size="14" fill="#d4874a" text-anchor="middle">Python</text>

    <!-- React -->
    <rect x="1240" y="72"  width="72"  height="30" rx="2" fill="#1c1a13" stroke="#2a261c" stroke-width="1"/>
    <text x="1276" y="92" font-family="'Courier New', monospace" font-size="14" fill="#7a6f5e" text-anchor="middle">React</text>

    <!-- Linux -->
    <rect x="1340" y="108" width="74"  height="30" rx="2" fill="#1c1a13" stroke="#2a261c" stroke-width="1"/>
    <text x="1377" y="128" font-family="'Courier New', monospace" font-size="14" fill="#7a6f5e" text-anchor="middle">Linux</text>

    <!-- AI -->
    <rect x="1090" y="158" width="46"  height="30" rx="2" fill="#1c1a13" stroke="#d4874a" stroke-width="1" opacity="0.7"/>
    <text x="1113" y="178" font-family="'Courier New', monospace" font-size="14" fill="#d4874a" text-anchor="middle">AI</text>

    <!-- Git -->
    <rect x="1170" y="165" width="56"  height="30" rx="2" fill="#1c1a13" stroke="#2a261c" stroke-width="1"/>
    <text x="1198" y="185" font-family="'Courier New', monospace" font-size="14" fill="#7a6f5e" text-anchor="middle">Git</text>

    <!-- ML -->
    <rect x="1260" y="155" width="48"  height="30" rx="2" fill="#1c1a13" stroke="#d4874a" stroke-width="1" opacity="0.6"/>
    <text x="1284" y="175" font-family="'Courier New', monospace" font-size="14" fill="#d4874a" text-anchor="middle">ML</text>

    <!-- Bash -->
    <rect x="1340" y="162" width="62"  height="30" rx="2" fill="#1c1a13" stroke="#2a261c" stroke-width="1"/>
    <text x="1371" y="182" font-family="'Courier New', monospace" font-size="14" fill="#7a6f5e" text-anchor="middle">Bash</text>

    <!-- pandas -->
    <rect x="1100" y="235" width="76"  height="30" rx="2" fill="#1c1a13" stroke="#2a261c" stroke-width="1"/>
    <text x="1138" y="255" font-family="'Courier New', monospace" font-size="14" fill="#7a6f5e" text-anchor="middle">pandas</text>

    <!-- NLP -->
    <rect x="1210" y="228" width="56"  height="30" rx="2" fill="#1c1a13" stroke="#d4874a" stroke-width="1" opacity="0.6"/>
    <text x="1238" y="248" font-family="'Courier New', monospace" font-size="14" fill="#d4874a" text-anchor="middle">NLP</text>

    <!-- POSIX -->
    <rect x="1300" y="235" width="70"  height="30" rx="2" fill="#1c1a13" stroke="#2a261c" stroke-width="1"/>
    <text x="1335" y="255" font-family="'Courier New', monospace" font-size="14" fill="#7a6f5e" text-anchor="middle">POSIX</text>

    <!-- Subtle connecting dots between tags -->
    <circle cx="1102" cy="143" r="2" fill="#2a261c"/>
    <circle cx="1155" cy="143" r="2" fill="#2a261c"/>
    <circle cx="1210" cy="143" r="2" fill="#2a261c"/>
    <circle cx="1265" cy="143" r="2" fill="#2a261c"/>
    <circle cx="1320" cy="143" r="2" fill="#2a261c"/>
    <circle cx="1375" cy="143" r="2" fill="#2a261c"/>
    <circle cx="1102" cy="215" r="2" fill="#2a261c"/>
    <circle cx="1155" cy="215" r="2" fill="#2a261c"/>
    <circle cx="1210" cy="215" r="2" fill="#2a261c"/>
    <circle cx="1265" cy="215" r="2" fill="#2a261c"/>
    <circle cx="1320" cy="215" r="2" fill="#2a261c"/>
    <circle cx="1375" cy="215" r="2" fill="#2a261c"/>

  </g>
</svg>
